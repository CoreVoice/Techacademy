      88%{opacity:1;transform:scale(1)}
      100%{offset-distance:100%;opacity:0;transform:scale(.6)}
    }
    .pulse-dot{animation:flowPulse 2.6s linear infinite;filter:url(#dotGlow)}
    @media (prefers-reduced-motion: reduce){ .pulse-dot{animation:none;opacity:0} }
  </style>
